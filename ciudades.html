    <!DOCTYPE html>
    <html lang="es">
    <head>
        <!-- =========================================================================
            METADATOS Y CONFIGURACIÓN DEL DOCUMENTO
            ========================================================================= -->
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Ciudades — LiveFinder</title>
        
        <!-- =========================================================================
            FUENTES GOOGLE (preconexión para mejorar rendimiento)
            - Preconnect: establece conexión temprana con los dominios de Google Fonts
            - Poppins: tipografía para títulos (pesos 600 y 700)
            - Inter: tipografía para texto general (pesos 400 y 500)
            ========================================================================= -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
        
        <!-- =========================================================================
            HOJAS DE ESTILO CSS
            - base.css: estilos globales (reset CSS, tipografías, utilidades, variables)
            - pages.css: estilos específicos para páginas (tarjetas de ciudades, cuadrículas)
            ========================================================================= -->
        <link rel="stylesheet" href="assets/css/base.css">
        <link rel="stylesheet" href="assets/css/pages.css">
    </head>
    <body>

    <!-- =========================================================================
        HEADER - BARRA DE NAVEGACIÓN PRINCIPAL
        ========================================================================= -->
    <!-- NOTA: Se utiliza <header> en lugar de <cabecera> para cumplir con el estándar HTML5 -->
    <header class="cabecera">
        <div class="container cabecera__interior">
            <!-- Logo del sitio: enlace a la página de inicio -->
            <a href="index.html" class="cabecera__logo">
                Live<span class="texto-acento">Finder</span>
            </a>
            
            <!-- Botón para menú hamburguesa en dispositivos móviles -->
            <!-- id="nav-boton": utilizado por JavaScript para controlar la visibilidad del menú -->
            <button class="nav__boton" id="nav-boton" aria-label="Abrir menú de navegación">☰</button>
            
            <!-- Menú de navegación principal -->
            <nav>
                <ul class="nav__lista" id="nav-menu">
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="resultados.html">Conciertos</a></li>
                    <!-- nav__enlace--activo: clase que indica la página actual (estilo visual activo) -->
                    <li><a href="ciudades.html" class="nav__enlace--activo">Ciudades</a></li>
                    <li><a href="sobre.html">Sobre</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- =========================================================================
        CABECERA DE LA PÁGINA DE CIUDADES
        Muestra el título principal y una breve descripción
        ========================================================================= -->
    <section class="cabecera-pagina">
        <div class="container">
            <!-- h1: encabezado principal de la página (solo uno por documento) -->
            <h1 class="seccion__titulo">Ciudades de España</h1>
            <p class="seccion__subtitulo">Selecciona una ciudad y descubre sus conciertos</p>
        </div>
    </section>

    <!-- =========================================================================
        GALERÍA DE CIUDADES - LISTADO COMPLETO
        ========================================================================= -->
    <section class="section">
        <div class="container">
            <!-- 
                CUADRÍCULA DE CIUDADES
                id="cuadricula-ciudades": contenedor principal de la galería.
                Aunque actualmente el contenido es estático, este ID permite:
                - Futuras modificaciones dinámicas con JavaScript
                - Posible carga de ciudades desde API en versiones posteriores
                - Estilos CSS específicos para la disposición en cuadrícula
            -->
            <div class="cuadricula-ciudades" id="cuadricula-ciudades">

                <!-- =============================================================
                    TARJETA DE CIUDAD: MADRID
                    Cada tarjeta es un enlace a resultados.html con parámetro city
                    La URL generada: resultados.html?city=Madrid
                    ============================================================= -->
                <a href="resultados.html?city=Madrid" class="tarjeta-ciudad">
                    <!-- 
                        Imagen de fondo de la ciudad
                        loading="lazy": carga diferida (lazy loading) para mejorar rendimiento
                        - Las imágenes solo se cargan cuando entran en el viewport
                        - Reduce el tiempo de carga inicial de la página
                    -->
                    <img src="assets/images/ciudades/madrid.jpg" alt="Madrid" class="tarjeta-ciudad__imagen" loading="lazy">
                    <!-- Capa semitransparente: mejora la legibilidad del texto sobre la imagen -->
                    <div class="tarjeta-ciudad__capa"></div>
                    <!-- Contenido superpuesto: nombre de la ciudad -->
                    <div class="tarjeta-ciudad__contenido">
                        <h3 class="tarjeta-ciudad__nombre">Madrid</h3>
                    </div>
                </a>

                <!-- Tarjeta de ciudad: BARCELONA -->
                <a href="resultados.html?city=Barcelona" class="tarjeta-ciudad">
                    <img src="assets/images/ciudades/barcelona.jpg" alt="Barcelona" class="tarjeta-ciudad__imagen" loading="lazy">
                    <div class="tarjeta-ciudad__capa"></div>
                    <div class="tarjeta-ciudad__contenido">
                        <h3 class="tarjeta-ciudad__nombre">Barcelona</h3>
                    </div>
                </a>

                <!-- Tarjeta de ciudad: SEVILLA -->
                <a href="resultados.html?city=Sevilla" class="tarjeta-ciudad">
                    <img src="assets/images/ciudades/sevilla.jpg" alt="Sevilla" class="tarjeta-ciudad__imagen" loading="lazy">
                    <div class="tarjeta-ciudad__capa"></div>
                    <div class="tarjeta-ciudad__contenido">
                        <h3 class="tarjeta-ciudad__nombre">Sevilla</h3>
                    </div>
                </a>

                <!-- Tarjeta de ciudad: VALENCIA -->
                <a href="resultados.html?city=Valencia" class="tarjeta-ciudad">
                    <img src="assets/images/ciudades/valencia.jpg" alt="Valencia" class="tarjeta-ciudad__imagen" loading="lazy">
                    <div class="tarjeta-ciudad__capa"></div>
                    <div class="tarjeta-ciudad__contenido">
                        <h3 class="tarjeta-ciudad__nombre">Valencia</h3>
                    </div>
                </a>

                <!-- Tarjeta de ciudad: BILBAO -->
                <a href="resultados.html?city=Bilbao" class="tarjeta-ciudad">
                    <img src="assets/images/ciudades/bilbao.jpg" alt="Bilbao" class="tarjeta-ciudad__imagen" loading="lazy">
                    <div class="tarjeta-ciudad__capa"></div>
                    <div class="tarjeta-ciudad__contenido">
                        <h3 class="tarjeta-ciudad__nombre">Bilbao</h3>
                    </div>
                </a>

                <!-- Tarjeta de ciudad: MÁLAGA -->
                <a href="resultados.html?city=Malaga" class="tarjeta-ciudad">
                    <img src="assets/images/ciudades/malaga.jpg" alt="Málaga" class="tarjeta-ciudad__imagen" loading="lazy">
                    <div class="tarjeta-ciudad__capa"></div>
                    <div class="tarjeta-ciudad__contenido">
                        <h3 class="tarjeta-ciudad__nombre">Málaga</h3>
                    </div>
                </a>

                <!-- Tarjeta de ciudad: ZARAGOZA -->
                <a href="resultados.html?city=Zaragoza" class="tarjeta-ciudad">
                    <img src="assets/images/ciudades/zaragoza.jpg" alt="Zaragoza" class="tarjeta-ciudad__imagen" loading="lazy">
                    <div class="tarjeta-ciudad__capa"></div>
                    <div class="tarjeta-ciudad__contenido">
                        <h3 class="tarjeta-ciudad__nombre">Zaragoza</h3>
                    </div>
                </a>

                <!-- Tarjeta de ciudad: GRANADA -->
                <a href="resultados.html?city=Granada" class="tarjeta-ciudad">
                    <img src="assets/images/ciudades/granada.jpg" alt="Granada" class="tarjeta-ciudad__imagen" loading="lazy">
                    <div class="tarjeta-ciudad__capa"></div>
                    <div class="tarjeta-ciudad__contenido">
                        <h3 class="tarjeta-ciudad__nombre">Granada</h3>
                    </div>
                </a>

                <!-- 
                    NOTA: Actualmente se muestran 8 ciudades principales de España.
                    En futuras versiones, este listado podría:
                    - Generarse dinámicamente desde JavaScript
                    - Cargarse desde una API o archivo JSON
                    - Incluir más ciudades o filtrarse por región
                -->

            </div>
        </div>
    </section>

    <!-- =========================================================================
        FOOTER - PIE DE PÁGINA
        ========================================================================= -->
    <footer>
        <div class="container">
            <div>
                <!-- Logo del sitio en el footer -->
                <span>Live<span class="texto-acento">Finder</span></span>
                <!-- 
                    El año del copyright se inserta dinámicamente.
                    id="pie-anio": JavaScript inserta el año actual usando new Date().getFullYear()
                    Esto evita tener que actualizar manualmente el año cada año.
                -->
                <p>© <span id="pie-anio"></span></p>
            </div>
            <div>
                <!-- Enlaces de navegación secundarios en el footer -->
                <a href="resultados.html">Conciertos</a>
                <a href="ciudades.html">Ciudades</a>
                <a href="sobre.html">Sobre</a>
            </div>
        </div>
    </footer>

    <!-- =========================================================================
        SCRIPTS JAVASCRIPT
        ========================================================================= -->
    <!-- 
        ORDEN DE CARGA (importante para las dependencias entre archivos):
        
        1. config.js     - Variables de configuración global
                        - API_BASE_URL: endpoint de la API de conciertos
                        - Otras constantes reutilizables
        
        2. api.js        - Funciones para llamadas a la API
                        - fetchEventosPorCiudad(ciudad): obtiene eventos por ciudad
                        - fetchEventoPorId(id): obtiene detalles de un evento específico
        
        3. ui.js         - Funciones de manipulación del DOM
                        - crearTarjetaEvento(evento): genera HTML para tarjetas
                        - crearDetalleEvento(evento): genera HTML para página de detalle
                        - Funciones de utilidad para mostrar/ocultar esqueletos
        
        4. search.js     - Lógica de búsqueda
                        - Maneja los formularios de búsqueda en el hero y CTA
                        - Gestiona los botones de búsqueda rápida (data-city)
                        - Redirige a resultados.html con el parámetro city
        
        5. pages.js      - Lógica específica para cada página
                        - Detecta en qué página estamos actualmente
                        - Página de ciudades: no requiere carga dinámica (contenido estático)
                        - Inserta el año actual en el footer (id="pie-anio")
                        - Configura el menú móvil (hamburguesa)
        
        NOTA: En esta página (ciudades.html) el contenido es estático, por lo que
        pages.js solo manejará el año del footer y la funcionalidad del menú móvil.
        No se realizan llamadas a la API en esta página específica.
    -->
    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/search.js"></script>
    <script src="assets/js/pages.js"></script>

    </body>
    </html>
