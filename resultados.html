    <!DOCTYPE html>
    <html lang="es">
    <head>
        <!-- =========================================================================
            METADATOS Y CONFIGURACIÓN DEL DOCUMENTO
            ========================================================================= -->
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Resultados — LiveFinder</title>
        <meta name="description" content="Conciertos y eventos en tu ciudad.">

        <!-- =========================================================================
            FUENTES GOOGLE (preconexión para mejorar rendimiento)
            - Preconnect: establece conexión temprana con los dominios de Google Fonts
            - Poppins: tipografía para títulos (pesos 600 y 700)
            - Inter: tipografía para texto general (pesos 400 y 500)
            ========================================================================= -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

        <!-- =========================================================================
            HOJAS DE ESTILO CSS
            - base.css: estilos globales (reset CSS, tipografías, utilidades)
            - pages.css: estilos específicos para páginas (resultados, filtros, etc.)
            ========================================================================= -->
        <link rel="stylesheet" href="assets/css/base.css">
        <link rel="stylesheet" href="assets/css/pages.css">
    </head>
    <body>

    <!-- =========================================================================
        HEADER - BARRA DE NAVEGACIÓN PRINCIPAL
        ========================================================================= -->
    <header class="cabecera">
        <div class="container cabecera__interior">
            <!-- Logo del sitio: enlace a la página de inicio -->
            <a href="index.html" class="cabecera__logo">
                Live<span class="texto-acento">Finder</span>
            </a>

            <!-- Botón para menú hamburguesa en dispositivos móviles -->
            <button class="nav__boton" id="nav-boton" aria-label="Abrir menú de navegación">☰</button>

            <!-- Menú de navegación principal -->
            <nav>
                <ul class="nav__lista" id="nav-menu">
                    <li><a href="index.html">Inicio</a></li>
                    <!-- nav__enlace--activo: clase que indica la página actual (estilo visual activo) -->
                    <li><a href="resultados.html" class="nav__enlace--activo">Conciertos</a></li>
                    <li><a href="ciudades.html">Ciudades</a></li>
                    <li><a href="sobre.html">Sobre</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- =========================================================================
        BUSCADOR DE RESULTADOS
        Barra de búsqueda compacta para que el usuario cambie de ciudad sin volver al inicio
        ========================================================================= -->
    <!-- 
        NOTA DE ACCESIBILIDAD: Se utiliza un <div> en lugar de <section> porque esta sección
        no tiene un encabezado (h2-h6). Si se quisiera mantener como <section>, se debería
        agregar un heading oculto visualmente pero accesible para lectores de pantalla.
    -->
    <div class="barra-busqueda-resultados">
        <div class="container">
            <!-- 
                Formulario de búsqueda para cambiar de ciudad en la página de resultados
                id="formulario-busqueda-resultados": utilizado por search.js para manejar el envío
                Al enviar, se redirige a la misma página (resultados.html) con el parámetro city
            -->
            <form class="buscador" id="formulario-busqueda-resultados">
                <input
                    type="search"
                    name="city"
                    class="buscador__campo"
                    placeholder="Buscar en otra ciudad..."
                    autocomplete="off"
                    required
                >
                <button type="submit" class="buscador__boton">Buscar</button>
            </form>
        </div>
    </div>

    <!-- =========================================================================
        CABECERA DE RESULTADOS
        Muestra la ciudad buscada, el número de eventos encontrados y los filtros disponibles
        ========================================================================= -->
    <section class="section">
        <div class="container">

            <div class="cabecera-resultados">
                <!-- 
                    span#ciudad-resultados: JavaScript inserta el nombre de la ciudad buscada
                    Este valor proviene del parámetro URL: resultados.html?city=Madrid
                    pages.js extrae este parámetro usando URLSearchParams y actualiza el span
                -->
                <h1 class="seccion__titulo">Conciertos en <span id="ciudad-resultados"></span></h1>

                <!-- 
                    FILTROS DE RESULTADOS
                    Permiten al usuario filtrar eventos por género musical y fecha
                    Los filtros se manejan mediante el archivo filters.js
                -->
                <div class="filtros-resultados">

                    <!-- 
                        Filtro de género musical
                        id="filtro-genero": utilizado por filters.js para detectar cambios
                        Al seleccionar una opción, se dispara un evento 'change' que filtra los eventos
                    -->
                    <select id="filtro-genero">
                        <option value="">Todos los géneros</option>
                        <option value="Rock">Rock</option>
                        <option value="Pop">Pop</option>
                        <option value="Hip-Hop/Rap">Hip-Hop / Rap</option>
                        <option value="Electronic">Electrónica</option>
                        <option value="R&B">R&B</option>
                        <option value="Latin">Latino</option>
                        <option value="Jazz">Jazz</option>
                    </select>

                    <!-- 
                        Filtro de fecha
                        id="filtro-fecha": utilizado por filters.js para detectar cambios
                        Las opciones permiten filtrar eventos por proximidad temporal
                    -->
                    <select id="filtro-fecha">
                        <option value="">Cualquier fecha</option>
                        <option value="7dias">Próximos 7 días</option>
                        <option value="30dias">Próximo mes</option>
                        <option value="3meses">Próximos 3 meses</option>
                    </select>

                </div>
            </div>

            <!-- 
                GRID DE RESULTADOS
                Contenedor donde JavaScript inserta las tarjetas de eventos
                id="cuadricula-resultados": utilizado por ui.js para renderizar los eventos
            -->
            <div class="cuadricula--eventos" id="cuadricula-resultados">
                <!-- =============================================================
                    ESQUELETOS DE CARGA (Skeleton Loaders)
                    Se muestran visualmente mientras se obtienen los datos de la API.
                    Una vez que la API responde, estos esqueletos son reemplazados
                    por las tarjetas de eventos generadas por crearTarjetaEvento() en ui.js
                    ============================================================= -->
                <div class="esqueleto esqueleto--tarjeta"></div>
                <div class="esqueleto esqueleto--tarjeta"></div>
                <div class="esqueleto esqueleto--tarjeta"></div>
                <div class="esqueleto esqueleto--tarjeta"></div>
                <div class="esqueleto esqueleto--tarjeta"></div>
                <div class="esqueleto esqueleto--tarjeta"></div>
            </div>

        </div>
    </section>

    <!-- =========================================================================
        FOOTER - PIE DE PÁGINA
        ========================================================================= -->
    <footer>
        <div class="container">
            <div>
                <!-- Logo del sitio en el footer -->
                <span>Live<span class="texto-acento">Finder</span></span>
                <!-- 
                    El año del copyright se inserta dinámicamente.
                    id="pie-anio": JavaScript inserta el año actual usando new Date().getFullYear()
                    Esto evita tener que actualizar manualmente el año cada año.
                -->
                <p>© <span id="pie-anio"></span></p>
            </div>
            <div>
                <!-- Enlaces de navegación secundarios en el footer -->
                <a href="resultados.html">Conciertos</a>
                <a href="ciudades.html">Ciudades</a>
                <a href="sobre.html">Sobre</a>
            </div>
        </div>
    </footer>

    <!-- =========================================================================
        SCRIPTS JAVASCRIPT
        ========================================================================= -->
    <!-- 
        ORDEN DE CARGA (importante para las dependencias entre archivos):
        
        1. config.js     - Variables de configuración global
                        - API_BASE_URL: endpoint de la API de conciertos
                        - Otras constantes reutilizables en toda la aplicación
        
        2. api.js        - Funciones para llamadas a la API
                        - fetchEventosPorCiudad(ciudad): obtiene eventos por ciudad
                        - fetchEventoPorId(id): obtiene detalles de un evento específico
                        - Todas las funciones retornan Promesas para manejo asíncrono
        
        3. ui.js         - Funciones de manipulación del DOM y renderizado
                        - crearTarjetaEvento(evento): genera HTML para cada tarjeta
                        - crearDetalleEvento(evento): genera HTML para página de detalle
                        - mostrarError(contenedor, mensaje): muestra mensajes de error
                        - renderizarEventos(contenedor, eventos): renderiza lista completa
        
        4. search.js     - Lógica de búsqueda y manejo de formularios
                        - Maneja los eventos submit de los formularios de búsqueda
                        - Extrae el valor de la ciudad y redirige a resultados.html?city=...
                        - Gestiona los botones de búsqueda rápida (data-city)
        
        5. filters.js    - Lógica de filtrado de eventos
                        - Maneja los eventos 'change' de los selects de género y fecha
                        - Filtra los eventos según los criterios seleccionados
                        - Funciones de filtrado por fecha: 
                            * 7dias: eventos en los próximos 7 días
                            * 30dias: eventos en el próximo mes
                            * 3meses: eventos en los próximos 3 meses
                        - Re-renderiza los resultados después de aplicar filtros
        
        6. pages.js      - Lógica específica para cada página del sitio
                        - Detecta en qué página estamos (index, resultados, evento, ciudades, sobre)
                        - Página de resultados:
                            1. Extrae el parámetro 'city' de la URL
                            2. Actualiza el span#ciudad-resultados con el nombre de la ciudad
                            3. Llama a fetchEventosPorCiudad() para obtener los eventos
                            4. Almacena los eventos en una variable global para los filtros
                            5. Renderiza los eventos en #cuadricula-resultados
                        - Inserta el año actual en el footer (id="pie-anio")
                        - Configura el menú móvil (hamburguesa)
        
        FLUJO COMPLETO DE LA PÁGINA DE RESULTADOS:
        1. Usuario accede a resultados.html?city=Madrid
        2. pages.js detecta que estamos en resultados.html
        3. Se extrae "Madrid" del parámetro URL y se muestra en el título
        4. Se llama a fetchEventosPorCiudad("Madrid") desde api.js
        5. Mientras la API responde, se muestran los esqueletos de carga
        6. Al recibir los datos, ui.js renderiza las tarjetas en el grid
        7. Los datos se almacenan para que filters.js pueda filtrarlos
        8. Usuario selecciona filtros (género, fecha) y los resultados se actualizan en tiempo real
    -->
    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/search.js"></script>
    <script src="assets/js/filters.js"></script>
    <script src="assets/js/pages.js"></script>

    </body>
    </html>
