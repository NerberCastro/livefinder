    <!DOCTYPE html>
    <html lang="es">
    <head>
        <!-- =========================================================================
            METADATOS Y CONFIGURACIÓN DEL DOCUMENTO
            ========================================================================= -->
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Evento — LiveFinder</title>

        <!-- =========================================================================
            HOJAS DE ESTILO CSS
            - base.css: estilos globales (reset CSS, tipografías, utilidades)
            - pages.css: estilos específicos para la página de detalle de evento
            ========================================================================= -->
        <link rel="stylesheet" href="assets/css/base.css">
        <link rel="stylesheet" href="assets/css/pages.css">
    </head>
    <body>

    <!-- =========================================================================
        HEADER - BARRA DE NAVEGACIÓN PRINCIPAL
        ========================================================================= -->
    <!-- NOTA: Se utiliza <header> en lugar de <cabecera> para cumplir con el estándar HTML5 -->
    <header class="cabecera">
        <div class="container cabecera__interior">
            <!-- Logo del sitio: enlace a la página de inicio -->
            <a href="index.html" class="cabecera__logo">
                Live<span class="texto-acento">Finder</span>
            </a>
            
            <!-- Botón para menú hamburguesa en dispositivos móviles -->
            <!-- id="nav-boton": utilizado por JavaScript para controlar la visibilidad del menú -->
            <button class="nav__boton" id="nav-boton" aria-label="Abrir menú de navegación">☰</button>
            
            <!-- Menú de navegación principal -->
            <nav>
                <ul class="nav__lista" id="nav-menu">
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="resultados.html">Conciertos</a></li>
                    <li><a href="ciudades.html">Ciudades</a></li>
                    <li><a href="sobre.html">Sobre</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- =========================================================================
        DETALLE DEL EVENTO - CONTENIDO PRINCIPAL
        ========================================================================= -->
    <!-- 
        Esta página muestra la información detallada de un evento específico.
        El contenido se carga dinámicamente mediante JavaScript.
        
        FLUJO DE CARGA:
        1. El usuario accede a evento.html?id=123 (el parámetro 'id' en la URL indica qué evento mostrar)
        2. JavaScript (pages.js) detecta que estamos en la página de evento
        3. Se extrae el 'id' de la URL usando URLSearchParams
        4. Se realiza una llamada a la API para obtener los datos del evento con ese ID
        5. Se muestra la información del evento dentro del contenedor con id="detalle-evento"
        
        Los esqueletos (skeleton loaders) se muestran mientras se realiza la petición API,
        mejorando la experiencia de usuario al indicar que el contenido está cargando.
    -->
    <main class="section">
        <div class="container">
            <!-- 
                Botón "Volver": utiliza javascript:history.back() para regresar a la página anterior.
                Esto permite al usuario volver a los resultados de búsqueda desde donde vino.
                style inline: solo se usa para mantener el espaciado, en producción debería estar en CSS.
            -->
            <a href="javascript:history.back()" class="boton boton--contorno" style="margin-bottom: 2rem; display: inline-block;">← Volver</a>

            <!-- 
                CONTENEDOR PRINCIPAL DEL EVENTO
                id="detalle-evento": punto de inserción donde ui.js renderizará el HTML del evento
                La función crearDetalleEvento() en ui.js genera el HTML con:
                - Nombre del artista o evento
                - Fecha y hora
                - Lugar/recinto
                - Ciudad
                - Descripción
                - Enlace de compra de entradas
            -->
            <div id="detalle-evento">
                <!-- =============================================================
                    ESQUELETOS DE CARGA (Skeleton Loaders)
                    Se muestran visualmente mientras se obtienen los datos del evento.
                    Cada esqueleto imita la estructura del contenido real:
                    - Primer esqueleto: simula una imagen o banner (height: 300px)
                    - Segundo y tercero: simulan líneas de texto
                    - Cuarto: simula texto corto (como un botón o metadata)
                    Una vez que la API responde, estos esqueletos son reemplazados
                    por el HTML generado en crearDetalleEvento()
                ============================================================= -->
                <div class="esqueleto" style="height: 300px; margin-bottom: 1.5rem;"></div>
                <div class="esqueleto esqueleto--texto"></div>
                <div class="esqueleto esqueleto--texto"></div>
                <div class="esqueleto esqueleto--texto-corto"></div>
            </div>
        </div>
    </main>

    <!-- =========================================================================
        FOOTER - PIE DE PÁGINA
        ========================================================================= -->
    <footer>
        <div class="container">
            <div>
                <!-- Logo del sitio en el footer -->
                <span>Live<span class="texto-acento">Finder</span></span>
                <!-- 
                    El año del copyright se inserta dinámicamente.
                    id="pie-anio": JavaScript inserta el año actual usando new Date().getFullYear()
                    Esto evita tener que actualizar manualmente el año cada enero.
                -->
                <p>© <span id="pie-anio"></span></p>
            </div>
            <div>
                <!-- Enlaces de navegación secundarios en el footer -->
                <a href="resultados.html">Conciertos</a>
                <a href="ciudades.html">Ciudades</a>
                <a href="sobre.html">Sobre</a>
            </div>
        </div>
    </footer>

    <!-- =========================================================================
        SCRIPTS JAVASCRIPT
        ========================================================================= -->
    <!-- 
        ORDEN DE CARGA (importante para las dependencias entre archivos):
        
        1. config.js     - Variables de configuración global
                        - API_BASE_URL: endpoint de la API de conciertos
                        - API_KEY (si es necesaria para autenticación)
                        - Otras constantes reutilizables en toda la aplicación
        
        2. api.js        - Funciones para llamadas a la API
                        - fetchEventoPorId(id): obtiene los datos de un evento específico
                        - fetchEventosPorCiudad(ciudad): obtiene eventos por ciudad
                        - Todas las funciones retornan Promesas para manejo asíncrono
        
        3. ui.js         - Funciones de manipulación del DOM y renderizado
                        - crearTarjetaEvento(evento): genera HTML para tarjetas en resultados.html
                        - crearDetalleEvento(evento): genera HTML para la página de detalle
                        - mostrarSkeleton(contenedor): muestra esqueletos de carga
                        - ocultarSkeleton(contenedor): oculta esqueletos y muestra contenido
        
        4. search.js     - Lógica de búsqueda y manejo de formularios
                        - Maneja los eventos submit de los formularios de búsqueda
                        - Extrae el valor de la ciudad y redirige a resultados.html?city=...
                        - Gestiona los botones de búsqueda rápida (data-city)
        
        5. pages.js      - Lógica específica para cada página del sitio
                        - Detecta en qué página estamos (index, resultados, evento, ciudades, sobre)
                        - Página de evento: extrae el parámetro 'id' de la URL, llama a fetchEventoPorId()
                            y renderiza el detalle usando crearDetalleEvento()
                        - Página de resultados: extrae el parámetro 'city', busca eventos y los renderiza
                        - Página de inicio: carga eventos destacados (Madrid por defecto)
                        - Inserta el año actual en el footer (id="pie-anio")
        
        NOTA: El orden es crítico porque pages.js depende de las funciones definidas en los archivos anteriores.
        Por ejemplo, pages.js llama a fetchEventoPorId() (definida en api.js) y a crearDetalleEvento() (definida en ui.js)
    -->
    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/search.js"></script>
    <script src="assets/js/pages.js"></script>

    </body>
    </html>
